name: Setup pgrx with downloaded PostgreSQL 17
description: >-
  Install OS packages needed to compile PostgreSQL from source, install
  cargo-pgrx 0.18, then run `cargo pgrx init --pg17 download` so PG17 and
  PGRX_HOME are managed entirely by pgrx (no apt PostgreSQL packages).

runs:
  using: composite
  steps:
    - name: Install build dependencies for pgrx-downloaded PostgreSQL
      shell: bash
      run: |
        set -euxo pipefail
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          bison \
          build-essential \
          ca-certificates \
          clang \
          curl \
          flex \
          git \
          libclang-dev \
          libicu-dev \
          libreadline-dev \
          libssl-dev \
          libxml2-dev \
          libxslt1-dev \
          pkg-config \
          zlib1g-dev

    - name: Install cargo-pgrx
      shell: bash
      run: cargo install cargo-pgrx --locked --version 0.18.0

    - name: pgrx init (download and build PG17)
      shell: bash
      run: cargo pgrx init --pg17 download -j 2
